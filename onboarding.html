<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mulai Belajar | Sistem Pembelajaran Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f9fafc 0%, #f0f4f8 100%);
            min-height: 100vh;
        }

        .header {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #1e293b;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
            transform: scale(1.02);
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #0f172a, #4f46e5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo span {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .main-container {
            display: flex;
            max-width: 1300px;
            margin-left: 6%;
            padding: 48px 32px;
            gap: 56px;
            align-items: flex-start;
        }

        .avatar-col {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }
        .avatar-wrapper {
            width: 300px;
            border-radius: 28px;
            overflow: hidden;
            background: transparent;
            transition: transform 0.3s ease;
        }
        .avatar-wrapper:hover {
            transform: scale(1.02);
        }
        .avatar-video {
            width: 100%;
            height: auto;
            aspect-ratio: 9 / 16;
            object-fit: cover;
            display: block;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
        }

        .chat-col {
            flex: 1.3;
        }
        .chat-window {
            background: white;
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 620px;
            transition: box-shadow 0.3s;
        }
        .chat-window:hover {
            box-shadow: 0 30px 55px -12px rgba(79, 70, 229, 0.2);
        }
        .chat-messages {
            flex: 1;
            padding: 28px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #ffffff;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 14px;
            max-width: 85%;
            animation: fadeSlideUp 0.3s ease;
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.bot { align-self: flex-start; }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            transition: all 0.2s;
        }
        .bot .bubble {
            background: #f1f5f9;
            border-bottom-left-radius: 8px;
            color: #0f172a;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .user .bubble {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border-bottom-right-radius: 8px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }

        .options-panel {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .option-chip {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .option-chip:hover {
            background: #eef2ff;
            border-color: #a5b4fc;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -8px rgba(79,70,229,0.3);
        }

        .input-area {
            border-top: 1px solid #edf2f7;
            padding: 18px 24px;
            background: white;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #fafcff;
        }
        .input-area input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .input-area button {
            background: #0f172a;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-area button:hover {
            background: #1e293b;
            transform: scale(1.02);
        }

        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-6px); }
        }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .main-container { flex-direction: column; margin-left: 5%; margin-right: 5%; padding: 24px; gap: 32px; align-items: center; }
            .avatar-col { justify-content: center; width: 260px; }
            .avatar-wrapper { width: 100%; }
            .chat-window { height: 520px; width: 100%; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" id="resetBtn">←</button>
        <div class="logo">Sistem Pembelajaran <span>Digital</span></div>
    </div>
    <div class="main-container">
        <div class="avatar-col">
            <div class="avatar-wrapper">
                <video id="avatarVideo" class="avatar-video"></video>
            </div>
        </div>
        <div class="chat-col">
            <div class="chat-window">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="input-area hidden" id="textInputArea">
                    <input type="text" id="textAnswer" placeholder="Ketik jawaban..." autocomplete="off">
                    <button id="sendTextBtn">Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const avatarVideo = document.getElementById('avatarVideo');

        function getVideoFile(questionText, title = null) {
            if (questionText.includes('Halo, ini adalah Sistem Pembelajaran Digital')) return 'sapaan.mp4';
            if (questionText === 'Hari ini kamu teh mau belajar apa?') return 'kelas.mp4';
            if (title === 'UI/UX Design' && questionText.includes('Di UI/UX Design ini')) return 'subtopik_uiux.mp4';
            if (questionText === 'Kamu ingin fokus ka bagian mana?') return 'fokus_uiux.mp4';
            if (questionText === 'Tujuan kamu belajar UI/UX Design teh naon?') return 'tujuan_uiux.mp4';
            if (questionText.includes('Mangga tentukeun tingkat kemampuan')) return 'level.mp4';
            if (questionText.includes('Saat ieu, tingkat pendidikan kamu teh naon?')) return 'pendidikan.mp4';
            if (questionText.includes('Selesai Mangga Isi nama')) return 'nama.mp4';
            return null;
        }

        function playVideo(file, muted, onFinished) {
            if (!file) {
                if (onFinished) onFinished();
                return;
            }
            avatarVideo.pause();
            avatarVideo.src = `video/${file}`;
            avatarVideo.muted = muted;
            avatarVideo.loop = false;
            avatarVideo.onended = () => {
                if (onFinished) onFinished();
            };
            avatarVideo.onerror = () => {
                console.warn(`Video ${file} tidak ditemukan`);
                if (onFinished) onFinished();
            };
            avatarVideo.play().catch(e => console.warn(`Gagal memutar ${file}:`, e));
        }

        // ========== LOGIKA PERTANYAAN ==========
        const kelasQuestion = {
            type: 'options',
            text: 'Hari ini kamu teh mau belajar apa?',
            options: ['Front-End Development', 'Back-End Development', 'Data Science', 'Cyber Security', 'Mobile Developer', 'Network Engineer', 'UI/UX Design', 'AI Engineer', 'Full Stack Developer'],
            field: 'kelas'
        };

        function generateDynamicQuestions(selectedClass) {
            if (selectedClass === 'UI/UX Design') {
                return [
                    { type: 'options', title: 'UI/UX Design', text: 'Di UI/UX Design ini, hal naon yang ingin kamu pelajari?', options: ['Dasar UI/UX', 'User Research', 'Wireframing & prototyping (Figma)', 'Design Aplikasi'], field: 'subtopik' },
                    { type: 'options', text: 'Kamu ingin fokus ka bagian mana?', options: ['UI Design (Visual)', 'UX Research'], field: 'fokus' },
                    { type: 'options', text: 'Tujuan kamu belajar UI/UX Design teh naon?', options: ['Ingin membangun Portfolio', 'Asah skill individu', 'Untuk Project Pribadi', 'Membangun aplikasi sendiri', 'Ingin Belajar untuk bisa memahami materi kuliah', 'Sekedar ingin mempelajari saja'], field: 'tujuan' }
                ];
            } else {
                return [
                    { type: 'options', text: `Di ${selectedClass} ini, hal naon yang ingin kamu pelajari?*`, options: ['Dasar-dasar', 'Teknik lanjutan', 'Studi kasus', 'Proyek nyata'], field: 'subtopik' },
                    { type: 'options', text: `Kamu ingin fokus ka bagian mana di ${selectedClass}?`, options: ['Teori', 'Praktik', 'Keduanya'], field: 'fokus' },
                    { type: 'options', text: `Tujuan kamu belajar ${selectedClass} teh naon?`, options: ['Membangun Portfolio', 'Asah skill individu', 'Untuk Project Pribadi', 'Membangun aplikasi sendiri', 'Ingin Belajar untuk bisa memahami materi kuliah', 'Sekedar ingin mempelajari saja'], field: 'tujuan' }
                ];
            }
        }

        const commonQuestions = [
            { type: 'options', text: 'Mangga tentukeun tingkat kemampuan anu bade kamu pelajari', options: ['Pemula - Mulai dari dasar...', 'Menengah - Pendalam pemahaman...', 'Lanjut - Hadapi tantangan kompleks...', 'Mahir - Capai penggunaan penuh...'], field: 'level' },
            { type: 'options', text: 'Saat ieu, tingkat pendidikan kamu teh naon?', options: ['S1', 'S2', 'S3'], field: 'pendidikan' },
            { type: 'text', text: 'Selesai Mangga Isi nama Akang atau teteh untuk membuat akun', placeholder: 'Ketik nama anda', field: 'nama' }
        ];

        let currentQuestions = [];
        let currentStepIndex = 0;
        let answers = {};
        let waitingForStart = true;

        const chatDiv = document.getElementById('chatMessages');
        const textAreaDiv = document.getElementById('textInputArea');
        const textInput = document.getElementById('textAnswer');
        const sendTextBtn = document.getElementById('sendTextBtn');

        function showTyping(cb) {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'tempTyping';
            typingDiv.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            chatDiv.appendChild(typingDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            setTimeout(() => {
                document.getElementById('tempTyping')?.remove();
                if (cb) cb();
            }, 500);
        }

        function addBotMessage(msg, title = null, playVideoFlag = true) {
            const div = document.createElement('div');
            div.className = 'message bot';
            let content = msg;
            if (title) content = `<strong style="color:#4f46e5;">${title}</strong><br><br>${msg}`;
            div.innerHTML = `<div class="bubble">${content}</div>`;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            if (playVideoFlag && !waitingForStart) {
                const videoFile = getVideoFile(msg, title);
                if (videoFile) playVideo(videoFile, false, null);
            }
        }

        function addUserMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div class="bubble">${msg}</div>`;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            avatarVideo.pause();
        }

        function showOptions(options, onSelect) {
            const container = document.createElement('div');
            container.className = 'message bot';
            const btns = options.map(opt => `<button class="option-chip" data-val="${opt.replace(/"/g, '&quot;')}">${opt}</button>`).join('');
            container.innerHTML = `<div class="bubble"><div class="options-panel">${btns}</div></div>`;
            chatDiv.appendChild(container);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            container.querySelectorAll('.option-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.getAttribute('data-val');
                    container.remove();
                    onSelect(val);
                });
            });
        }

        function askNextQuestion() {
            if (currentStepIndex >= currentQuestions.length) {
                // ========== SIMPAN SEMUA DATA KE LOCALSTORAGE ==========
                if (answers.kelas) localStorage.setItem('user_selected_class', answers.kelas);
                if (answers.subtopik) localStorage.setItem('user_selected_subtopik', answers.subtopik);
                if (answers.fokus) localStorage.setItem('user_selected_fokus', answers.fokus);
                if (answers.tujuan) localStorage.setItem('user_selected_tujuan', answers.tujuan);
                if (answers.level) localStorage.setItem('user_selected_level', answers.level);
                if (answers.pendidikan) localStorage.setItem('user_selected_pendidikan', answers.pendidikan);
                
                const nama = answers.nama || 'Pengguna';
                localStorage.setItem('asynchronous_user_name', nama);
                window.location.href = `register.html?nama=${encodeURIComponent(nama)}`;
                return;
            }
            const q = currentQuestions[currentStepIndex];
            if (q.type === 'options') {
                showTyping(() => {
                    addBotMessage(q.text, q.title || null, true);
                    showOptions(q.options, (selected) => {
                        addUserMessage(selected);
                        answers[q.field] = selected;
                        currentStepIndex++;
                        askNextQuestion();
                    });
                });
            } else if (q.type === 'text') {
                showTyping(() => {
                    addBotMessage(q.text, null, true);
                    textAreaDiv.classList.remove('hidden');
                    textInput.placeholder = q.placeholder || 'Ketik jawaban...';
                    textInput.value = '';
                    textInput.focus();
                    window.currentTextQ = q;
                });
            }
        }

        function startOnboarding() {
            if (!waitingForStart) return;
            waitingForStart = false;
            addUserMessage("START");
            playVideo('sapaan.mp4', false, () => {
                showTyping(() => {
                    addBotMessage(kelasQuestion.text, kelasQuestion.title || null, true);
                    showOptions(kelasQuestion.options, (selected) => {
                        addUserMessage(selected);
                        answers[kelasQuestion.field] = selected;
                        const dynamic = generateDynamicQuestions(selected);
                        currentQuestions = [...dynamic, ...commonQuestions];
                        currentStepIndex = 0;
                        askNextQuestion();
                    });
                });
            });
        }

        function resetConversation() {
            avatarVideo.pause();
            avatarVideo.src = '';
            chatDiv.innerHTML = '';
            answers = {};
            waitingForStart = true;
            textAreaDiv.classList.add('hidden');
            currentQuestions = [];
            currentStepIndex = 0;
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `<div class="bubble">Halo, ini adalah Sistem Pembelajaran Digital!<br>Sudah siap untuk diajar? Mangga pencet start untuk memulai<br><div class="options-panel" style="margin-top:12px;"><button class="option-chip" id="startChipBtn">🚀 START</button></div></div>`;
            chatDiv.appendChild(div);
            const startBtn = document.getElementById('startChipBtn');
            if (startBtn) {
                startBtn.addEventListener('click', startOnboarding);
            } else {
                setTimeout(() => {
                    const btn = document.getElementById('startChipBtn');
                    if (btn) btn.addEventListener('click', startOnboarding);
                }, 100);
            }
            playVideo('sapaan.mp4', true, null);
        }

        document.getElementById('resetBtn').addEventListener('click', resetConversation);
        sendTextBtn.addEventListener('click', () => {
            const answer = textInput.value.trim();
            if (!answer) return;
            const q = window.currentTextQ;
            if (!q) return;
            addUserMessage(answer);
            answers[q.field] = answer;
            textAreaDiv.classList.add('hidden');
            currentStepIndex++;
            setTimeout(() => askNextQuestion(), 300);
        });
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendTextBtn.click();
        });

        resetConversation();
    </script>
</body>
</html>
