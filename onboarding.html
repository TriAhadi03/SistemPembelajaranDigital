<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mulai Belajar | Sistem Pembelajaran Digital</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(145deg,#f9fafc 0%,#f0f4f8 100%);
            height:100vh;
            overflow:hidden;
        }

        .header{
            height:80px;
            padding:16px 32px;
            background:rgba(255,255,255,0.8);
            backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(0,0,0,0.05);
            display:flex;
            align-items:center;
            gap:20px;
        }

        .back-btn{
            width:44px;
            height:44px;
            border:none;
            border-radius:50%;
            background:#f1f5f9;
            cursor:pointer;
            font-size:22px;
        }

        .logo{
            font-size:22px;
            font-weight:700;
            color:#111827;
        }

        .logo span{
            color:#4f46e5;
        }

        .main-container{
            display:flex;
            gap:40px;
            padding:24px 32px;
            height:calc(100vh - 80px);
            max-width:1400px;
            margin:auto;
        }

        .avatar-col{
            width:320px;
            display:flex;
            justify-content:center;
        }

        .avatar-wrapper{
            width:280px;
        }

        .avatar-video{
            width:100%;
            aspect-ratio:9/16;
            object-fit:cover;
            border-radius:24px;
            background:black;
            box-shadow:0 20px 40px rgba(0,0,0,0.15);
        }

        .chat-col{
            flex:1;
        }

        .chat-window{
            height:100%;
            background:white;
            border-radius:30px;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            box-shadow:0 20px 40px rgba(0,0,0,0.1);
        }

        .chat-messages{
            flex:1;
            overflow-y:auto;
            padding:24px;
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .message{
            display:flex;
            max-width:85%;
        }

        .message.bot{
            align-self:flex-start;
        }

        .message.user{
            align-self:flex-end;
        }

        .bubble{
            padding:14px 18px;
            border-radius:22px;
            font-size:14px;
            line-height:1.5;
        }

        .bot .bubble{
            background:#f1f5f9;
            color:#111827;
            border-bottom-left-radius:8px;
        }

        .user .bubble{
            background:#4f46e5;
            color:white;
            border-bottom-right-radius:8px;
        }

        .options-panel{
            margin-top:12px;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }

        .option-chip{
            border:none;
            background:white;
            border:1px solid #cbd5e1;
            border-radius:999px;
            padding:10px 16px;
            cursor:pointer;
            font-size:13px;
            transition:0.2s;
        }

        .option-chip:hover{
            background:#eef2ff;
            border-color:#4f46e5;
        }

        .input-area{
            padding:18px;
            border-top:1px solid #e5e7eb;
            display:flex;
            gap:12px;
        }

        .input-area input{
            flex:1;
            padding:12px 16px;
            border-radius:999px;
            border:1px solid #cbd5e1;
            outline:none;
        }

        .input-area button{
            border:none;
            background:#111827;
            color:white;
            padding:12px 22px;
            border-radius:999px;
            cursor:pointer;
        }

        .hidden{
            display:none;
        }

        @media(max-width:768px){

            body{
                overflow:auto;
            }

            .main-container{
                flex-direction:column;
                height:auto;
            }

            .avatar-col{
                width:100%;
            }

            .avatar-wrapper{
                width:220px;
            }

            .chat-window{
                height:600px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <button class="back-btn" id="resetBtn">←</button>
        <div class="logo">
            Sistem Pembelajaran <span>Digital</span>
        </div>
    </div>

    <div class="main-container">

        <div class="avatar-col">
            <div class="avatar-wrapper">

                <video
                    id="avatarVideo"
                    class="avatar-video"
                    autoplay
                    muted
                    playsinline
                    webkit-playsinline
                >
                </video>

            </div>
        </div>

        <div class="chat-col">

            <div class="chat-window">

                <div class="chat-messages" id="chatMessages"></div>

                <div class="input-area hidden" id="textInputArea">
                    <input
                        type="text"
                        id="textAnswer"
                        placeholder="Ketik jawaban..."
                    />

                    <button id="sendTextBtn">
                        Kirim
                    </button>
                </div>

            </div>

        </div>

    </div>

<script>

const avatarVideo = document.getElementById("avatarVideo");

function getVideoFile(questionText, title = null){

    if(questionText.includes("Halo")){
        return "sapaan.mp4";
    }

    if(questionText === "Hari ini kamu teh mau belajar apa?"){
        return "kelas.mp4";
    }

    if(title === "UI/UX Design" && questionText.includes("Di UI/UX Design")){
        return "subtopik_uiux.mp4";
    }

    if(questionText === "Kamu ingin fokus ka bagian mana?"){
        return "fokus_uiux.mp4";
    }

    if(questionText.includes("Tujuan kamu belajar UI/UX")){
        return "tujuan_uiux.mp4";
    }

    if(questionText.includes("Mangga tentukeun tingkat")){
        return "level.mp4";
    }

    if(questionText.includes("Saat ieu")){
        return "pendidikan.mp4";
    }

    if(questionText.includes("Selesai Mangga Isi nama")){
        return "nama.mp4";
    }

    return null;
}

function playVideo(file, muted = true, onFinished = null){

    if(!file){
        if(onFinished) onFinished();
        return;
    }

    const fullPath = `./Video/${file}`;

    console.log("PLAY:", fullPath);

    avatarVideo.pause();

    avatarVideo.innerHTML = `
        <source src="${fullPath}" type="video/mp4">
    `;

    avatarVideo.load();

    avatarVideo.currentTime = 0;
    avatarVideo.muted = muted;
    avatarVideo.autoplay = true;
    avatarVideo.loop = false;

    avatarVideo.onended = () => {

        console.log("SELESAI:", file);

        if(onFinished){
            onFinished();
        }
    };

    avatarVideo.onerror = () => {

        console.error("VIDEO ERROR:", fullPath);

        if(onFinished){
            onFinished();
        }
    };

    const promise = avatarVideo.play();

    if(promise !== undefined){

        promise
            .then(() => {
                console.log("VIDEO BERHASIL");
            })
            .catch((err) => {
                console.error("AUTOPLAY GAGAL:", err);
            });
    }
}

const kelasQuestion = {

    type:"options",

    text:"Hari ini kamu teh mau belajar apa?",

    options:[
        "Front-End Development",
        "Back-End Development",
        "Data Science",
        "Cyber Security",
        "Mobile Developer",
        "Network Engineer",
        "UI/UX Design",
        "AI Engineer",
        "Full Stack Developer"
    ],

    field:"kelas"
};

function generateDynamicQuestions(selectedClass){

    if(selectedClass === "UI/UX Design"){

        return [

            {
                type:"options",
                title:"UI/UX Design",
                text:"Di UI/UX Design ini, hal naon yang ingin kamu pelajari?",
                options:[
                    "Dasar UI/UX",
                    "User Research",
                    "Wireframing & prototyping (Figma)",
                    "Design Aplikasi"
                ],
                field:"subtopik"
            },

            {
                type:"options",
                text:"Kamu ingin fokus ka bagian mana?",
                options:[
                    "UI Design (Visual)",
                    "UX Research"
                ],
                field:"fokus"
            }
        ];
    }

    return [];
}

const commonQuestions = [

    {
        type:"options",
        text:"Mangga tentukeun tingkat kemampuan anu bade kamu pelajari",
        options:[
            "Pemula",
            "Menengah",
            "Lanjut"
        ],
        field:"level"
    },

    {
        type:"text",
        text:"Selesai Mangga Isi nama Akang atau teteh untuk membuat akun",
        placeholder:"Ketik nama anda",
        field:"nama"
    }
];

let currentQuestions = [];
let currentStepIndex = 0;
let answers = {};
let waitingForStart = true;

const chatDiv = document.getElementById("chatMessages");
const textAreaDiv = document.getElementById("textInputArea");
const textInput = document.getElementById("textAnswer");
const sendTextBtn = document.getElementById("sendTextBtn");

function addBotMessage(msg, title = null, playVideoFlag = true){

    const div = document.createElement("div");

    div.className = "message bot";

    let content = msg;

    if(title){

        content = `
            <strong style="color:#4f46e5;">
                ${title}
            </strong>
            <br><br>
            ${msg}
        `;
    }

    div.innerHTML = `
        <div class="bubble">
            ${content}
        </div>
    `;

    chatDiv.appendChild(div);

    chatDiv.scrollTop = chatDiv.scrollHeight;

    if(playVideoFlag && !waitingForStart){

        const videoFile = getVideoFile(msg, title);

        if(videoFile){

            playVideo(videoFile, true, null);
        }
    }
}

function addUserMessage(msg){

    const div = document.createElement("div");

    div.className = "message user";

    div.innerHTML = `
        <div class="bubble">
            ${msg}
        </div>
    `;

    chatDiv.appendChild(div);

    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showOptions(options, onSelect){

    const container = document.createElement("div");

    container.className = "message bot";

    container.innerHTML = `
        <div class="bubble">
            <div class="options-panel">

                ${options.map(opt => `
                    <button
                        class="option-chip"
                        data-value="${opt}"
                    >
                        ${opt}
                    </button>
                `).join("")}

            </div>
        </div>
    `;

    chatDiv.appendChild(container);

    chatDiv.scrollTop = chatDiv.scrollHeight;

    container.querySelectorAll(".option-chip").forEach(btn => {

        btn.addEventListener("click", () => {

            const val = btn.dataset.value;

            container.remove();

            onSelect(val);
        });
    });
}

function askNextQuestion(){

    if(currentStepIndex >= currentQuestions.length){

        const nama = answers.nama || "Pengguna";

        window.location.href =
            `register.html?nama=${encodeURIComponent(nama)}`;

        return;
    }

    const q = currentQuestions[currentStepIndex];

    addBotMessage(q.text, q.title || null, true);

    if(q.type === "options"){

        showOptions(q.options, (selected) => {

            addUserMessage(selected);

            answers[q.field] = selected;

            currentStepIndex++;

            askNextQuestion();
        });
    }

    else if(q.type === "text"){

        textAreaDiv.classList.remove("hidden");

        textInput.placeholder = q.placeholder;

        textInput.value = "";

        textInput.focus();

        window.currentTextQ = q;
    }
}

function startOnboarding(){

    if(!waitingForStart){
        return;
    }

    waitingForStart = false;

    addUserMessage("START");

    playVideo("sapaan.mp4", true, () => {

        addBotMessage(kelasQuestion.text);

        showOptions(kelasQuestion.options, (selected) => {

            addUserMessage(selected);

            answers[kelasQuestion.field] = selected;

            const dynamic =
                generateDynamicQuestions(selected);

            currentQuestions = [
                ...dynamic,
                ...commonQuestions
            ];

            currentStepIndex = 0;

            askNextQuestion();
        });
    });
}

function resetConversation(){

    avatarVideo.pause();

    avatarVideo.src = "";

    chatDiv.innerHTML = "";

    answers = {};

    waitingForStart = true;

    currentQuestions = [];

    currentStepIndex = 0;

    textAreaDiv.classList.add("hidden");

    const div = document.createElement("div");

    div.className = "message bot";

    div.innerHTML = `
        <div class="bubble">

            Halo, ini adalah Sistem Pembelajaran Digital!
            <br><br>

            <button
                class="option-chip"
                id="startChipBtn"
            >
                🚀 START
            </button>

        </div>
    `;

    chatDiv.appendChild(div);

    document
        .getElementById("startChipBtn")
        .addEventListener("click", startOnboarding);

    playVideo("sapaan.mp4", true, null);
}

document
    .getElementById("resetBtn")
    .addEventListener("click", resetConversation);

sendTextBtn.addEventListener("click", () => {

    const answer = textInput.value.trim();

    if(!answer){
        return;
    }

    const q = window.currentTextQ;

    if(!q){
        return;
    }

    addUserMessage(answer);

    answers[q.field] = answer;

    textAreaDiv.classList.add("hidden");

    currentStepIndex++;

    askNextQuestion();
});

textInput.addEventListener("keypress", (e) => {

    if(e.key === "Enter"){

        sendTextBtn.click();
    }
});

resetConversation();

</script>

</body>
</html>
